<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金名魔法學院 - 代名詞與 Be 動詞全攻略 V3.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Nova+Script&display=swap');

        :root {
            --theme-color: #0f172a;
            --accent-gold: #ecc94b;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--theme-color);
            color: #fff;
            min-height: 100vh;
            transition: background-color 1s ease;
            overflow-x: hidden;
        }

        .magic-font { font-family: 'Nova Script', cursive; }

        /* 區域背景主題 */
        .bg-region-0 { --theme-color: #064e3b; } /* 草地 */
        .bg-region-1 { --theme-color: #1e1b4b; } /* 森林 */
        .bg-region-2 { --theme-color: #334155; } /* 礦坑 */
        .bg-region-3 { --theme-color: #0c4a6e; } /* 湖泊 */
        .bg-region-4 { --theme-color: #78350f; } /* 沙漠 */
        .bg-region-5 { --theme-color: #3f3f46; } /* 工廠 */
        .bg-region-6 { --theme-color: #164e63; } /* 沼澤 */
        .bg-region-7 { --theme-color: #44403c; } /* 山谷 */
        .bg-region-8 { --theme-color: #7f1d1d; } /* 神殿 */
        .bg-region-9 { --theme-color: #2e1065; } /* 魔王城 */

        /* 地圖導航 */
        .map-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 20px 0;
            scrollbar-width: none;
        }
        .map-node {
            flex: 0 0 100px;
            text-align: center;
            opacity: 0.4;
            transition: all 0.5s;
        }
        .map-node.active { opacity: 1; transform: scale(1.1); }
        .node-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px;
            border: 2px solid transparent;
        }
        .active .node-icon { border-color: var(--accent-gold); box-shadow: 0 0 15px var(--accent-gold); background: rgba(236, 201, 75, 0.2); }

        /* 戰鬥動畫 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); }
            75% { transform: translateX(10px) rotate(5deg); }
        }
        .monster-hit { animation: shake 0.2s ease-in-out 2; filter: brightness(1.5) sepia(1) saturate(5) hue-rotate(-50deg); }
        
        @keyframes fadeOutUp {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-50px); }
        }
        .damage-num {
            position: absolute;
            color: #ffeb3b;
            font-weight: 900;
            font-size: 2rem;
            pointer-events: none;
            z-index: 50;
            text-shadow: 2px 2px 0 #000;
            animation: fadeOutUp 0.8s ease-out forwards;
        }

        .monster-die { animation: rotateOut 0.8s ease-in forwards; }
        @keyframes rotateOut {
            to { transform: rotate(360deg) scale(0); opacity: 0; }
        }

        /* 答題卡 */
        .quiz-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--accent-gold); background: rgba(236, 201, 75, 0.1); }
        .correct { background: #10b981 !important; border-color: #34d399 !important; }
        .wrong { background: #ef4444 !important; border-color: #f87171 !important; }

        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4 md:p-8 bg-region-0">

    <!-- 頂部資訊 -->
    <header class="max-w-5xl mx-auto mb-6 no-print">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-black text-yellow-400 magic-font">JingMing Academy</h1>
                <p class="text-xs tracking-[0.3em] text-white/50 uppercase">V3.7 Junior High Exam Mode</p>
            </div>
            <div class="flex gap-4 mt-4 md:mt-0">
                <div class="bg-black/40 px-6 py-2 rounded-2xl border border-white/10 text-center">
                    <p class="text-[10px] text-gray-400 uppercase">冒險稱號</p>
                    <p id="rank-name" class="text-sm font-bold text-yellow-500">初級學徒</p>
                </div>
                <div class="bg-black/40 px-6 py-2 rounded-2xl border border-white/10 text-center">
                    <p class="text-[10px] text-gray-400 uppercase">魔法經驗值</p>
                    <p id="xp-val" class="text-sm font-bold text-blue-400">0 XP</p>
                </div>
            </div>
        </div>

        <div class="map-container" id="map-rail"></div>
    </header>

    <main class="max-w-4xl mx-auto space-y-6">
        <!-- 戰鬥區域 -->
        <section class="no-print relative bg-white/5 rounded-[2.5rem] p-8 border border-white/10 overflow-hidden shadow-2xl">
            <div class="flex items-center justify-between relative z-10">
                <div id="monster-box" class="relative group">
                    <div id="monster-sprite" class="text-8xl md:text-9xl floating cursor-help">👾</div>
                    <div id="damage-container"></div>
                </div>
                
                <div class="flex-grow px-8">
                    <div class="flex justify-between items-end mb-2">
                        <div>
                            <p id="region-title" class="text-yellow-400 font-black text-sm uppercase tracking-widest">REGION 01: 草地</p>
                            <h2 id="monster-name" class="text-2xl font-bold text-white">智慧導師的考驗</h2>
                        </div>
                        <p id="hp-label" class="text-xs font-black text-red-500">HP: 10/10</p>
                    </div>
                    <div class="h-4 bg-black/40 rounded-full border border-white/10 overflow-hidden">
                        <div id="hp-bar" class="h-full bg-gradient-to-r from-red-600 to-orange-400 transition-all duration-500" style="width: 100%"></div>
                    </div>
                    <div id="level-dots" class="flex gap-1.5 mt-4 justify-center"></div>
                </div>

                <div class="hidden md:block text-right">
                    <p class="text-[10px] text-gray-400 font-bold">QUEST PROGRESS</p>
                    <p id="progress-num" class="text-4xl font-black text-white/20">01/100</p>
                </div>
            </div>
        </section>

        <!-- 答題區域 -->
        <div id="quiz-root" class="no-print min-h-[420px]"></div>

        <!-- 錯題集 -->
        <section id="error-log" class="hidden bg-slate-900 rounded-[2.5rem] p-8 border border-red-500/30 shadow-2xl">
            <div class="flex justify-between items-center mb-6 no-print">
                <h2 class="text-2xl font-bold text-red-400"><i class="fas fa-book-dead mr-2"></i> 修煉弱點記錄</h2>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm text-white">列印講義</button>
                    <button onclick="toggleErrorLog()" class="bg-red-500/20 text-red-200 px-4 py-2 rounded-lg text-sm">關閉</button>
                </div>
            </div>
            <div id="error-list" class="space-y-4"></div>
        </section>
    </main>

    <!-- 結算彈窗 -->
    <div id="win-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-slate-800 border-2 border-yellow-400 p-10 rounded-[3rem] text-center max-w-md w-full shadow-2xl">
            <div class="text-7xl mb-4">🏆</div>
            <h2 class="text-3xl font-black text-yellow-400 mb-2">傳奇達成！</h2>
            <p class="text-gray-400 mb-6">你已完成所有代名詞與 Be 動詞挑戰</p>
            <div id="final-report" class="bg-black/30 p-4 rounded-2xl mb-6 text-left space-y-2 text-white"></div>
            <button onclick="location.reload()" class="w-full bg-yellow-400 text-black font-black py-4 rounded-2xl hover:scale-105 transition-transform">重新開啟冒險</button>
        </div>
    </div>

    <script>
        const regionData = [
            { name: "草地領域", emoji: "👾", boss: "新手導師", color: "bg-region-0" },
            { name: "森林領域", emoji: "👻", boss: "森林護士", color: "bg-region-1" },
            { name: "礦坑領域", emoji: "👺", boss: "礦坑工程師", color: "bg-region-2" },
            { name: "湖畔領域", emoji: "❄️", boss: "湖邊漁夫", color: "bg-region-3" },
            { name: "沙漠領域", emoji: "🌵", boss: "沙漠醫生", color: "bg-region-4" },
            { name: "工廠領域", emoji: "🤖", boss: "工廠領班", color: "bg-region-5" },
            { name: "沼澤領域", emoji: "🐙", boss: "沼澤農夫", color: "bg-region-6" },
            { name: "山谷領域", emoji: "👹", boss: "山谷警察", color: "bg-region-7" },
            { name: "神殿領域", emoji: "🔥", boss: "神殿廚師", color: "bg-region-8" },
            { name: "終極之城", emoji: "🐲", boss: "終極校長", color: "bg-region-9" }
        ];

        // 題目範本產生器：模擬大考題型
        function generateExamQuestions() {
            const templates = [
                // 1. Be 動詞基礎與單複數
                () => ({
                    q: "The students in that room _______ very happy today.",
                    opts: ["am", "is", "are", "be"], a: 2,
                    hint: "主詞是複數的 students，複數 Be 動詞要選 are。"
                }),
                () => ({
                    q: "My sister and I _______ good friends.",
                    opts: ["am", "is", "are", "be"], a: 2,
                    hint: "My sister and I 是兩個人（我們），複數主詞要用 are。"
                }),
                () => ({
                    q: "The cat under the table _______ very cute.",
                    opts: ["am", "is", "are", "be"], a: 1,
                    hint: "主詞是單數的 The cat，Be 動詞要選 is。"
                }),
                // 2. 主格 vs 受格
                () => ({
                    q: "Look at that tall boy. _______ is my brother.",
                    opts: ["He", "His", "Him", "He's"], a: 0,
                    hint: "空格在句首當主詞，要用主格 He。"
                }),
                () => ({
                    q: "Our teacher likes ______ because we study hard.",
                    opts: ["we", "our", "us", "ours"], a: 2,
                    hint: "放在動詞 likes 之後，要用受格 us。"
                }),
                () => ({
                    q: "This gift is for ______ . Happy birthday!",
                    opts: ["you", "your", "yours", "yours'"], a: 0,
                    hint: "放在介系詞 for 之後，要用受格 you。"
                }),
                // 3. 所有格形容詞 vs 所有格代名詞
                () => ({
                    q: "Is this _______ new English book?",
                    opts: ["you", "your", "yours", "yours'"], a: 1,
                    hint: "後面有名詞 book，前面要用所有格形容詞 your。"
                }),
                () => ({
                    q: "That blue pen is not mine. It is _______.",
                    opts: ["she", "her", "hers", "hers'"], a: 2,
                    hint: "這裡代表 hers = her pen。後面沒有名詞，要用所有格代名詞。"
                }),
                () => ({
                    q: "Whose bag is that? It's _______.",
                    opts: ["Tom", "Tom's", "of Tom", "Toms"], a: 1,
                    hint: "詢問是「誰的」，回答要用所有格 Tom's。"
                }),
                // 4. 進階所有格 (共同與各自)
                () => ({
                    q: "Amy and Ben's _______ is very big and clean.",
                    opts: ["room", "rooms", "of room", "rooms'"], a: 0,
                    hint: "一個 's 是共同擁有，所以後面的房間 room 要用單數。"
                }),
                () => ({
                    q: "Amy's and Ben's _______ are different colors.",
                    opts: ["room", "rooms", "room's", "rooms'"], a: 1,
                    hint: "兩個 's 是各自擁有，所以後面的房間 rooms 要用複數。"
                }),
                // 5. It's vs Its
                () => ({
                    q: "The dog is hungry. _______ food is on the floor.",
                    opts: ["It's", "Its", "It", "Its'"], a: 1,
                    hint: "這裡是指「它的」食物，要用所有格 Its。"
                }),
                () => ({
                    q: "Look! _______ a very beautiful bird.",
                    opts: ["It", "Its", "It's", "Its'"], a: 2,
                    hint: "It's = It is (它是)。這句話是「它是一隻...」。"
                }),
                // 6. 人稱排列禮貌順序
                () => ({
                    q: "_______ are in the same school club.",
                    opts: ["I, you and he", "You, he and I", "He, I and you", "You, I and he"], a: 1,
                    hint: "單數人稱並列時，禮貌順序是 2-3-1 (你, 他, 我)。"
                }),
                () => ({
                    q: "_______ are going to the movie together.",
                    opts: ["We, you and they", "You, they and we", "They, we and you", "We, they and you"], a: 0,
                    hint: "複數人稱並列時，順序是 1-2-3 (我們, 你們, 他們)。"
                })
            ];

            let pool = [];
            for(let i=0; i<100; i++) {
                const func = templates[i % templates.length];
                pool.push(func());
            }
            return pool;
        }

        // 音效引擎
        const AudioEngine = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(freq, type, duration, volume = 0.1) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                gain.gain.setValueAtTime(volume, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            success() { this.play(523.25, 'sine', 0.3); setTimeout(()=>this.play(659.25, 'sine', 0.4), 100); },
            error() { this.play(150, 'sawtooth', 0.5, 0.2); },
            hit() { this.play(60, 'square', 0.2, 0.3); }
        };

        let questions = [];
        let answers = new Array(100).fill(null);
        let currentIndex = 0;

        function updateUI() {
            const ridx = Math.floor(currentIndex / 10);
            const r = regionData[ridx];
            document.body.className = `p-4 md:p-8 ${r.color}`;
            document.getElementById('region-title').innerText = `REGION 0${ridx+1}: ${r.name}`;
            document.getElementById('monster-name').innerText = r.boss;
            document.getElementById('monster-sprite').innerText = r.emoji;
            const hp = 10 - (currentIndex % 10);
            document.getElementById('hp-bar').style.width = `${hp * 10}%`;
            document.getElementById('hp-label').innerText = `HP: ${hp}/10`;
            document.getElementById('progress-num').innerText = `${String(currentIndex+1).padStart(2,'0')}/100`;

            const mapRail = document.getElementById('map-rail');
            mapRail.innerHTML = regionData.map((reg, i) => `
                <div class="map-node ${ridx === i ? 'active' : ''}">
                    <div class="node-icon">${reg.emoji}</div>
                    <p class="text-[9px] font-bold mt-1 uppercase text-white/40">${reg.name}</p>
                </div>
            `).join('');

            const dots = document.getElementById('level-dots');
            dots.innerHTML = Array.from({length:10}).map((_, i) => {
                const idx = ridx * 10 + i;
                let state = "bg-white/20";
                if(idx === currentIndex) state = "bg-yellow-400 scale-125 shadow-lg shadow-yellow-400/50";
                else if(answers[idx]?.ok) state = "bg-green-500";
                else if(answers[idx]) state = "bg-red-500";
                return `<div class="w-2 h-2 rounded-full transition-all ${state}"></div>`;
            }).join('');

            renderQuiz();
            updateStats();
        }

        function renderQuiz() {
            const root = document.getElementById('quiz-root');
            const q = questions[currentIndex];
            const ans = answers[currentIndex];

            let html = `
                <div class="quiz-card p-8 md:p-12 animate-in fade-in slide-in-from-bottom-4 duration-500 shadow-2xl">
                    <h3 class="text-2xl md:text-3xl font-bold mb-10 leading-relaxed text-white drop-shadow-md">${q.q}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            `;

            q.opts.forEach((opt, i) => {
                let cls = "";
                if(ans) {
                    if(i === q.a) cls = "correct text-white scale-[1.02] shadow-lg";
                    else if(i === ans.sel) cls = "wrong text-white";
                }
                html += `
                    <button onclick="selectOpt(${i})" ${ans ? 'disabled' : ''} 
                        class="option-btn p-6 rounded-2xl text-xl font-bold text-left flex justify-between items-center text-white/80 ${cls}">
                        <span><span class="opacity-30 mr-2 text-sm">${String.fromCharCode(65+i)}</span> ${opt}</span>
                        ${ans && i === q.a ? '<i class="fas fa-check-circle"></i>' : ''}
                    </button>
                `;
            });

            html += `</div>`;

            if(ans) {
                html += `
                    <div class="mt-8 p-6 bg-white/5 rounded-2xl border border-white/10 flex flex-col md:flex-row items-center gap-6 animate-in zoom-in-95">
                        <div class="flex-grow">
                            <p class="text-yellow-400 text-xs font-black mb-1 uppercase tracking-tighter">智慧導師重點攻略</p>
                            <p class="text-gray-200 text-lg leading-relaxed">${q.hint}</p>
                        </div>
                        <button onclick="goNext()" class="bg-yellow-400 text-slate-900 px-10 py-4 rounded-xl font-black text-lg hover:scale-105 active:scale-95 transition-all shadow-xl">
                            ${currentIndex === 99 ? '完成修煉' : '繼續挑戰'} <i class="fas fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                `;
            }

            html += `</div>`;
            root.innerHTML = html;
        }

        function selectOpt(idx) {
            const q = questions[currentIndex];
            const ok = idx === q.a;
            answers[currentIndex] = { sel: idx, ok };
            if(ok) {
                AudioEngine.success();
                AudioEngine.hit();
                showDamage();
                triggerShake();
            } else {
                AudioEngine.error();
            }
            renderQuiz();
        }

        function triggerShake() {
            const s = document.getElementById('monster-sprite');
            s.classList.add('monster-hit');
            setTimeout(() => s.classList.remove('monster-hit'), 400);
            if((currentIndex + 1) % 10 === 0) {
                setTimeout(() => s.classList.add('monster-die'), 500);
            }
        }

        function showDamage() {
            const container = document.getElementById('damage-container');
            const d = document.createElement('div');
            d.className = 'damage-num';
            d.innerText = `-${Math.floor(Math.random()*200 + 800)}`;
            d.style.left = `${Math.random()*50}px`;
            container.appendChild(d);
            setTimeout(() => d.remove(), 800);
        }

        function goNext() {
            if(currentIndex < 99) {
                const s = document.getElementById('monster-sprite');
                s.classList.remove('monster-die');
                currentIndex++;
                updateUI();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showFinal();
            }
        }

        function updateStats() {
            const correct = answers.filter(a => a?.ok).length;
            document.getElementById('xp-val').innerText = `${correct * 50} XP`;
            let r = "初級學徒";
            if(correct > 95) r = "傳奇教育家";
            else if(correct > 80) r = "資深大賢者";
            else if(correct > 50) r = "高級導師";
            else if(correct > 20) r = "正式法師";
            document.getElementById('rank-name').innerText = r;
        }

        function toggleErrorLog() {
            const log = document.getElementById('error-log');
            log.classList.toggle('hidden');
            if(!log.classList.contains('hidden')) {
                const list = document.getElementById('error-list');
                const mistakes = answers.map((a,i) => a && !a.ok ? i : null).filter(i => i !== null);
                if(mistakes.length === 0) {
                    list.innerHTML = `<p class="text-center py-10 text-gray-500 font-bold">目前無任何弱點，繼續保持！</p>`;
                } else {
                    list.innerHTML = mistakes.map(idx => `
                        <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                            <p class="text-xs text-red-400 font-black mb-2 uppercase">Quest Failed #${idx+1}</p>
                            <p class="text-xl font-bold mb-4 text-white">${questions[idx].q}</p>
                            <div class="flex gap-4">
                                <div class="flex-grow p-3 bg-red-500/10 rounded-lg border border-red-500/20">
                                    <p class="text-[10px] text-red-300 uppercase">Your Choice</p>
                                    <p class="font-bold text-red-200">${questions[idx].opts[answers[idx].sel]}</p>
                                </div>
                                <div class="flex-grow p-3 bg-green-500/10 rounded-lg border border-green-500/20">
                                    <p class="text-[10px] text-green-300 uppercase">Correct Answer</p>
                                    <p class="font-bold text-green-200">${questions[idx].opts[questions[idx].a]}</p>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
                log.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function showFinal() {
            const modal = document.getElementById('win-modal');
            const correct = answers.filter(a => a?.ok).length;
            document.getElementById('final-report').innerHTML = `
                <p>冒險成功率：<span class="text-yellow-400 font-bold">${correct}%</span></p>
                <p>最終獲得經驗：<span class="text-blue-400 font-bold">${correct * 50} XP</span></p>
                <p>擊敗領域首領：<span class="text-red-400 font-bold">10 位</span></p>
            `;
            modal.classList.remove('hidden');
        }

        window.onload = () => {
            questions = generateExamQuestions();
            updateUI();
            document.addEventListener('click', () => AudioEngine.init(), { once: true });
        };
